[[mods]]
modId="earth_online_xuanhuan"
version="0.7.0-alpha.5"
displayName="Xuanhuan Earth on Minecraft / 玄幻地球 on Minecraft"
description='''
In-development beta for Minecraft 26.2 + NeoForge 26.2.0.7-beta.
Xuanhuan Earth on Minecraft is independently playable and adds a xuanhuan world layer:
spiritual veins, spirit springs, talismans, alchemy vessels and formation cores.
This build implements the first playable cultivation loop: handbook screen,
field-aware alchemy/talisman/array stations, JEI categories, consumable
starter outputs, vanilla material routes, and optional Earth Human API-based recovery links.
The server-synced cultivation panel now opens from a configurable key anywhere.
Free practice is available after learning Qi Guiding, while the optional cushion adds full efficiency,
continuous cycles, directional posture, a four-phase HUD and stronger recovery.
The handbook is now a permanent navigation item, while technique manuals only
unlock routes. Repeated practice advances independent level-1-to-10 experience
tracks, and each route has a mana-costed active technique with its own cooldown.
Level rewards now produce real metabolic, combat-resilience and breathing consequences;
the handbook reports live progression and the next valid action.
The handbook also tracks a persistent six-step standalone journey from initiation through
practice, facility output, active technique, artifact use and spirit-beast contracting.
Successful practice, recovery and combat techniques broadcast short-lived player
action states instead of writing unused telemetry.
Creature render states now carry real attack progress and sitting posture for
species-specific strike, guard and recovery motion.
The ecosystem slice now includes five independent contractable spirit beasts,
three persistent companion modes, affinity-based sealing, dedicated models and drops.
Three cultivation resident roles use real merchant containers, while wandering markets,
spirit spring villages and sect frontier outposts generate through isolated features and
deferred settlement anchors without replacing vanilla villages or mutating vanilla mobs.
'''
authors="xxsx"

